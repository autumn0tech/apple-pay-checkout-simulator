kind = "web"
previewPath = "/"
title = "Apple Pay Checkout Simulator"
version = "1.0.0"
id = "artifacts/apple-pay-checkout"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20853
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/apple-pay-checkout run dev"

[services.env]
PORT = "20853"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/apple-pay-checkout", "run", "build"]
publicDir = "artifacts/apple-pay-checkout/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
